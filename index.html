<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>漢字学習システム：極 v45-PrintFix (Selector Update)</title>
    <style>
        /* =========================================
           共通・基盤設定
           ========================================= */
        :root {
            --paper-bg: #fffdf5;
            --ink-black: #333;
            --perfect-green: #2ecc71;
            --retry-orange: #f39c12; 
            --action-blue: #3498db;
            --update-purple: #9b59b6;
            --suspend-gray: #95a5a6;
            --special-orange: #e67e22;
            --special-green: #27ae60;
            --random-purple: #8e44ad; 
            --main-font: "UD Digital Kyokasho N-R", "UD デジタル 教科書体 N-R", BIZ UDPGothic, sans-serif;
            --border-width: 2px;
            --border-color: #000; 
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0; 
            background-color: #e0d8c3;
            font-family: var(--main-font);
            overflow: hidden; 
            width: 100vw; height: 100vh;
        }

        body.mode-practice { display: flex; justify-content: center; align-items: center; position: relative; }
        body.mode-view { display: block; overflow: hidden; }

        #loading { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-weight: bold; color: #555;
        }

        .hidden { display: none !important; }

        .highlight { 
            color: #e74c3c; 
            font-weight: bold; 
            display: inline; 
        }
        
        #practice-app .highlight {
            text-decoration: underline #e74c3c 2px;
            text-underline-offset: 3px;
        }

        #view-app .highlight {
            text-decoration: none;
        }

        /* --- こうしんボタン --- */
        /* ※絶対配置（position:absolute）を解除し、自然な配置に変更 */
        #top-update-btn {
            background: var(--update-purple); color: white;
            border: 3px solid var(--ink-black); padding: 8px 15px;
            border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 14px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
            display: none;
            flex-direction: column; align-items: center; line-height: 1.2;
            margin: 0; 
        }
        #top-update-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
        #top-update-btn small { font-size: 10px; font-weight: normal; margin-top: 2px; }

        /* =========================================
           セレクター画面（6列・スリム化対応）
           ========================================= */
        #selector-screen {
            display: none; flex-direction: column; align-items: center;
            background: var(--paper-bg); padding: 25px; border-radius: 30px;
            border: 5px solid var(--ink-black); 
            width: 96vw; max-width: 1400px; /* 6列のために幅を広く */
            max-height: 92vh; overflow-y: auto; 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; box-shadow: 15px 15px 0 rgba(0,0,0,0.1);
        }

        #sheet-list {
            display: grid;
            grid-template-columns: repeat(6, 1fr); /* 6列固定 */
            gap: 12px; width: 100%; align-items: start;
        }

        .grade-column {
            display: flex; flex-direction: column; gap: 8px;
            background: rgba(0,0,0,0.04); padding: 12px; border-radius: 15px;
            border: 1px solid #ddd;
        }

        .grade-header {
            text-align: center; font-weight: bold; font-size: 18px;
            padding: 6px; border-bottom: 3px solid var(--ink-black);
            margin-bottom: 8px; background: #f0f0f0; border-radius: 8px;
        }

        .sheet-row { display: flex; width: 100%; gap: 4px; align-items: stretch; margin: 0; }

        .sheet-btn {
            flex-grow: 1; padding: 8px 10px; font-size: 14px; font-weight: bold; 
            background: white; border: 2px solid var(--ink-black); 
            border-radius: 10px; cursor: pointer; font-family: var(--main-font);
            display: flex; flex-direction: column; justify-content: center;
            min-height: 55px; line-height: 1.2; overflow: hidden; text-align: left;
        }

        .reset-mini-btn {
            width: 32px; background: #eee; border: 2px solid var(--ink-black); 
            border-radius: 8px; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; font-size: 14px;
            flex-shrink: 0;
        }

        /* レスポンシブ対応（画面が狭いときは列数を減らす） */
        @media (max-width: 1200px) { #sheet-list { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 800px)  { #sheet-list { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px)  { #sheet-list { grid-template-columns: 1fr; } }

        /* 共通モーダル設定 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-card {
            background: white; padding: 30px; border-radius: 25px; border: 5px solid var(--ink-black);
            text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .mode-btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        
        .btn {
            width: 100%; padding: 12px; border: 3px solid var(--ink-black); border-radius: 15px;
            font-size: 18px; font-weight: bold; cursor: pointer; font-family: var(--main-font);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1); background: white;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }
        
        .btn-practice { background: #f1c40f; }
        .btn-random { background: var(--random-purple); color: white; }
        .btn-view { background: var(--action-blue); color: white; }
        .btn-print { background: var(--perfect-green); color: white; }
        .btn-perfect { background: var(--perfect-green); color: white; }
        .btn-retry { background: var(--retry-orange); color: white; }
        .btn-suspend { background: var(--suspend-gray); color: white; font-size: 16px; }
        .btn-special { background: var(--special-orange); color: white; }
        .btn-special-check { background: var(--special-green); color: white; }
        .btn-cancel { background: transparent; border: none; box-shadow: none; color: #999; text-decoration: underline; margin-top: 10px; }

        /* =========================================
           練習モード UI
           ========================================= */
        #practice-app {
            display: none; grid-template-columns: 350px 1.5fr 1.2fr 50px; 
            gap: 25px; width: 94vw; height: 90vh; padding: 10px;
        }
        .box { 
            border: 4px solid var(--ink-black); border-radius: 20px; background: var(--paper-bg); 
            overflow: hidden; display: flex; flex-direction: column; box-shadow: 6px 6px 0 rgba(0,0,0,0.1);
        }
        
        .left-column { padding: 25px; height: 100%; }
        .stats p { margin: 8px 0; font-size: 19px; border-bottom: 2px dotted #bbb; padding-bottom: 5px; }
        .stats span { font-size: 30px; font-weight: bold; color: var(--action-blue); }

        .middle-column { display: flex; flex-direction: column; gap: 15px; align-items: center; height: 100%; padding: 20px; }
        .answer-container {
            width: 100%; flex-grow: 1; max-height: 80%; border: 3px dashed #ccc; border-radius: 15px; background: white;
            display: flex; flex-direction: row-reverse; justify-content: center; align-items: center; gap: 60px; padding: 20px; 
            opacity: 0; transform: scale(0.95);
        }
        .answer-container.visible { opacity: 1; transform: scale(1); transition: 0.2s ease-out; }
        .ans-column { writing-mode: vertical-rl; font-size: clamp(50px, 11vh, 95px); color: #e74c3c; font-weight: bold; white-space: nowrap; }
        
        .right-column { display: flex; flex-direction: row-reverse; gap: 10px; height: 100%; padding: 20px; }
        .q-num-box { 
            border: 3px solid var(--ink-black); min-width: 45px; height: 45px; 
            display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; background: white; border-radius: 10px; 
        }
        .q-area { 
            flex-grow: 1; writing-mode: vertical-rl; font-size: clamp(22px, 4vh, 34px); line-height: 2.2; 
            padding: 10px 15px 30px; background-image: radial-gradient(#ddd 1.5px, transparent 1.5px); 
            background-size: 35px 35px; overflow-y: auto; 
        }
        
        .title-column { writing-mode: vertical-rl; display: flex; align-items: center; font-size: 16px; font-weight: bold; color: #666; padding-top: 10px; }

        /* =========================================
           閲覧・印刷モード UI
           ========================================= */
        #view-app { display: none; width: 100%; height: 100%; }
        .view-header { 
            width: 100%; height: auto; min-height: 50px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 5px 20px; background: #fff; border-bottom: 1px solid #ccc; 
        }
        .header-center { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .header-note { font-size: 11px; color: #555; font-weight: bold; margin-top: 4px; }

        #view-mode-container { height: calc(100vh - 70px); display: flex; flex-direction: column; align-items: center; padding: 10px; overflow-y: auto; }
        
        /* 印刷用キャンバス */
        .view-canvas { 
            display: flex; flex-direction: row-reverse; 
            height: 185mm; width: 285mm; 
            background: white; border: var(--border-width) solid var(--border-color); 
            padding: 20px; margin-bottom: 20px; flex-shrink: 0; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        
        .kanji-table-grid { display: block; height: 100%; flex-grow: 1; border: var(--border-width) solid var(--border-color); background: var(--border-color); }
        .unified-table { width: 100%; height: 100%; border-collapse: collapse; table-layout: fixed; direction: rtl; background: white; }
        .unified-table td { border: var(--border-width) solid var(--border-color); text-align: center; vertical-align: middle; padding: 0; direction: ltr; position: relative; }
        
        .tr-check { height: 10%; }
        .tr-num   { height: 6%; }
        .tr-ques  { height: 53%; }
        .tr-num2  { height: 6%; }
        .tr-ans   { height: 25%; }

        .h-ques-inner { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: flex-start; padding-top: 15px; overflow: hidden; }
        .ques-wrapper { writing-mode: vertical-rl; text-orientation: upright; font-size: 1.8vh; text-align: left; }
        .ans-wrapper { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .ans-text { writing-mode: vertical-rl; text-orientation: upright; font-size: 2.3vh; font-weight: bold; color: #e74c3c; white-space: normal; }
        .ans-text.blind { opacity: 0; }
        .ans-wrapper.show-hint::before { content: "？"; color: #ccc; font-size: 3vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 0; }
        .print-title { writing-mode: vertical-rl; font-weight: bold; border: var(--border-width) solid var(--border-color); border-left: 4px double #000; padding: 0 15px; margin-left: 15px; background: white; }
        
        .square { width: 25px; height: 25px; border: 2px solid #000; margin: auto; cursor: pointer; display: flex; justify-content: center; align-items: center; font-weight: bold; user-select: none; font-size: 20px; }
        .square[data-state="1"]::after { content: "✔"; color: var(--perfect-green); }
        .square[data-state="2"]::after { content: "△"; color: var(--retry-orange); font-size: 16px; }

        .btn-action { padding: 6px 15px; background: #eee; border: 1px solid #999; border-radius: 5px; cursor: pointer; font-weight: bold; font-family: var(--main-font); }

        /* =========================================
           【印刷用設定】
           ここを調整して「ズレ」と「白黒対策」を行っています
           ========================================= */
        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            
            html, body, #view-app, #view-mode-container {
                width: 100% !important;
                height: auto !important;
                overflow: visible !important;
                display: block !important;
            }
            #top-update-btn, .view-header, #loading, #selector-screen, .modal-overlay, #practice-app { 
                display: none !important; 
            }
            .view-canvas { 
                margin: 0 auto !important; 
                page-break-after: always !important; 
                break-inside: avoid !important;
                box-shadow: none !important; 
                border: var(--border-width) solid var(--border-color) !important; 
            }
            .ans-text { color: black !important; opacity: 1 !important; visibility: visible !important; }
            .ans-wrapper::before { content: none !important; }
            .square[data-state="1"]::after { color: #000 !important; } 
            .square[data-state="2"]::after { color: #000 !important; }

            .highlight {
                color: #000 !important;
                background: #e0e0e0 !important;
                text-decoration: none !important;
                -webkit-print-color-adjust: exact;
                padding: 2px 0;
            }
        }
    </style>
</head>
<body class="mode-practice">

    <div id="loading">✨ データを読み込んでいます... ✨</div>

    <div id="selector-screen">
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%; margin-bottom:20px; border-bottom:2px solid #ccc; padding-bottom:10px;">
            <h2 style="margin:0; font-size:24px;">📖 問題集を選んでね</h2>
            <button id="top-update-btn" onclick="fetchData(true)">
                🔄 こうしん<br><small>(先生からお知らせがあったとき)</small>
            </button>
        </div>
        <div id="sheet-list" style="width:100%;"></div>
    </div>

    <div id="mode-select-modal" class="modal-overlay">
        <div class="modal-card">
            <h2 id="modal-sheet-title"></h2>
            <div class="mode-btn-group">
                <button class="btn btn-practice" onclick="handleModeSelection('practice')">１もん ずつ (じゅんばん)</button>
                <button class="btn btn-random" onclick="handleModeSelection('random')">🎲 ランダムで れんしゅう</button>
                <button class="btn btn-view" onclick="handleModeSelection('view')">いちらんを みて れんしゅう</button>
                <button class="btn btn-print" onclick="handleModeSelection('print')">プリントを印刷</button>
                <button class="btn btn-cancel" onclick="closeAllModals()">キャンセル</button>
            </div>
        </div>
    </div>

    <div id="practice-options-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>この問題集は練習したことがあるよ！</h3>
            <div class="mode-btn-group">
                <button id="opt-resume-btn" class="btn btn-view" onclick="confirmPracticeStart('resume')">🔄 つづきから</button>
                <button id="opt-special-btn" class="btn btn-special" onclick="confirmPracticeStart('special')">🔥 おぼえちゅうをとっくん</button>
                <button id="opt-perfect-btn" class="btn btn-special-check" onclick="confirmPracticeStart('perfect_check')">✨ かんぺきをたしかめる</button>
                <button class="btn" onclick="confirmPracticeStart('restart')">🆕 はじめから</button>
                <button class="btn btn-cancel" onclick="closeAllModals()">キャンセル</button>
            </div>
        </div>
    </div>

    <div id="practice-app">
        <div class="box left-column">
            <h4 style="text-align:center; font-size: 24px; margin: 0 0 20px 0;">📔 学習の記録</h4>
            <div class="stats">
                <p>進行度：<span id="stat-total">0/0</span></p>
                <p>かんぺき：<span id="stat-perfect" style="color:var(--perfect-green)">0</span></p>
                <p>おぼえちゅう：<span id="stat-retry" style="color:var(--retry-orange)">0</span></p>
            </div>
            <div style="margin-top:auto; display:grid; gap:10px;">
                <button id="side-special-btn" class="btn btn-special hidden" onclick="startSidebarSpecial()">🔥 おぼえちゅうをとっくん</button>
                <button id="side-perfect-btn" class="btn btn-special-check hidden" onclick="startSidebarPerfect()">✨ かんぺきをたしかめる</button>
                <button class="btn btn-view" onclick="switchToViewMode()">📖 いちらんで れんしゅう</button>
                <button class="btn btn-suspend" onclick="suspendQuiz()">⏸ ちゅうだんする</button>
                <button class="btn" style="background:#eee; font-size:16px;" onclick="backToList()">🏠 リストに戻る</button>
            </div>
        </div>
        <div class="box middle-column" style="flex-grow:1;">
            <div id="mode-badge" class="hidden" style="background:var(--special-orange); color:white; padding:5px 15px; border-radius:10px;">🔥 とっくんモード</div>
            <div id="mode-badge-perfect" class="hidden" style="background:var(--special-green); color:white; padding:5px 15px; border-radius:10px;">✨ ふくしゅうモード</div>
            <div id="mode-badge-random" class="hidden" style="background:var(--random-purple); color:white; padding:5px 15px; border-radius:10px;">🎲 ランダムモード</div>
            <div class="answer-container" id="a-text"></div>
            <div style="width:100%; display:flex; flex-direction:column; align-items:center; gap:10px;">
                <button id="show-btn" class="btn btn-view" style="width:90%; min-height:70px; font-size:22px;" onclick="showAnswer()">答えをみる</button>
                <div id="judgement-btns" class="hidden" style="display:flex; gap:10px; width:90%;">
                    <button class="btn btn-perfect" style="flex:1; min-height:70px;" onclick="record('perfect')">かんぺき！</button>
                    <button class="btn btn-retry" style="flex:1; min-height:70px;" onclick="record('retry')">おぼえちゅう</button>
                </div>
                <div id="retry-options" class="hidden" style="display:flex; gap:10px; width:90%;">
                    <button class="btn" style="flex:1; min-height:60px;" onclick="nextStep()">次の問題 ＞</button>
                    <button class="btn" style="flex:1; min-height:60px; border-style:dashed;" onclick="tryAgain()">もう一度 🔄</button>
                </div>
            </div>
        </div>
        <div class="box right-column">
            <div class="q-num-box" id="q-number"></div>
            <div class="q-area" id="q-text"></div>
        </div>
        <div id="sheet-title" class="title-column"></div>
    </div>

    <div id="view-app">
        <div class="view-header">
            <button class="btn-action" onclick="backToList()">× 閉じる</button>
            <div class="header-center">
                <div class="header-actions">
                    <button class="btn-action" onclick="returnToPractice()">✏️ １もんずつ</button>
                    <button id="toggle-all-btn" class="btn-action" onclick="toggleAllAnswers()">すべての答えをひょうじ</button>
                    <button id="view-retry-btn" class="btn-action hidden" style="background:var(--retry-orange); color:white; border-color:#e67e22;" onclick="startViewSpecial()">🔥 とっくん</button>
                    <button id="view-perfect-btn" class="btn-action hidden" style="background:var(--perfect-green); color:white; border-color:#27ae60;" onclick="startViewPerfect()">✨ ふくしゅう</button>
                </div>
                <span class="header-note">※下の 答えの ぶぶんを クリックしても 答えが見れるよ</span>
            </div>
            <div id="nav-controls">
                <button class="btn-action" onclick="changeViewPage(-1)">← 前</button>
                <span id="page-info" style="font-weight:bold; margin:0 10px;"></span>
                <button class="btn-action" onclick="changeViewPage(1)">次 →</button>
            </div>
        </div>
        <div id="view-mode-container"></div>
    </div>
    <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyWHprvWe-NcrfamWL2I6bWSAak6HW-JxyMCY-RZkZDFrhLkbSfLkeVmpKyznlI7g3a/exec";
    const CACHE_KEY = "kanji_quiz_v42_sync"; 
    const PROGRESS_KEY = "kanji_quiz_prog_v42_sync";
    
    let allData = {};
    let allProgress = {};
    let currentSheetName = "";
    let currentQuestions = [];
    let currentIndex = 0;
    let currentModeType = 'normal';
    let viewPage = 0;
    const itemsPerPage = 15;
    let isAllAnswersVisible = false;

    async function fetchData(force = false) {
        document.getElementById('loading').style.display = 'flex';
        const cached = localStorage.getItem(CACHE_KEY);
        if (!force && cached) {
            try {
                allData = JSON.parse(cached);
                loadProg(); createMenu(); return;
            } catch(e) { console.error(e); }
        }
        try {
            const res = await fetch(API_URL);
            allData = await res.json();
            localStorage.setItem(CACHE_KEY, JSON.stringify(allData));
            loadProg(); createMenu();
            if(force) alert("最新データに更新しました！");
        } catch(e) { 
            alert("読み込みエラー。通信を確認してください。");
            document.getElementById('loading').innerText = "読み込みエラー";
        }
    }

    function loadProg() {
        const saved = localStorage.getItem(PROGRESS_KEY);
        if (saved) {
            const parsed = JSON.parse(saved);
            for (let k in parsed) {
                allProgress[k] = {
                    perfect: new Set(parsed[k].perfect),
                    retry: new Set(parsed[k].retry),
                    lastIndex: parsed[k].lastIndex || 0
                };
            }
        }
    }

    function saveProgress() {
        const toSave = {};
        for (let k in allProgress) {
            toSave[k] = {
                perfect: Array.from(allProgress[k].perfect),
                retry: Array.from(allProgress[k].retry),
                lastIndex: allProgress[k].lastIndex
            };
        }
        localStorage.setItem(PROGRESS_KEY, JSON.stringify(toSave));
    }

    // ★ 修正箇所：学年別に6列に振り分け、エスケープ処理を追加
    function createMenu() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('selector-screen').style.display = 'flex';
        document.getElementById('practice-app').style.display = 'none';
        document.getElementById('view-app').style.display = 'none';
        document.body.className = "mode-practice";
        document.getElementById('top-update-btn').style.display = 'flex';
        closeAllModals();

        const list = document.getElementById('sheet-list');
        list.innerHTML = "";

        const grades = ["１年", "２年", "３年", "４年", "５年", "６年"];
        const columns = {};

        grades.forEach(g => {
            const col = document.createElement('div');
            col.className = "grade-column";
            col.innerHTML = `<div class="grade-header">${g}</div>`;
            columns[g] = col;
            list.appendChild(col);
        });

        const otherCol = document.createElement('div');
        otherCol.className = "grade-column";
        otherCol.innerHTML = `<div class="grade-header">その他</div>`;

        Object.keys(allData).forEach(key => {
            const row = document.createElement('div');
            row.className = "sheet-row";
            
            const prog = allProgress[key];
            const retryCount = prog ? prog.retry.size : 0;
            const badge = retryCount > 0 ? `<div style="background:var(--retry-orange); color:white; padding:1px 5px; border-radius:5px; font-size:10px; margin-top:3px; align-self:flex-start;">おぼえちゅう:${retryCount}</div>` : "";
            
            // シングルクォーテーションをエスケープしてバグを防ぐ
            const escapedKey = key.replace(/'/g, "\\'"); 
            
            row.innerHTML = `
                <button class="sheet-btn" onclick="openModeModal('${escapedKey}')">
                    <div style="word-break:break-all;">${key}</div>
                    ${badge}
                </button>
                <button class="reset-mini-btn" onclick="clearProg('${escapedKey}')">🗑️</button>
            `;

            const prefix = key.substring(0, 2);
            if (columns[prefix]) {
                columns[prefix].appendChild(row);
            } else {
                otherCol.appendChild(row);
            }
        });

        if (otherCol.children.length > 1) {
            list.appendChild(otherCol);
        }
    }

    // ★ 修正箇所：モーダルを開くときにリストを隠す
    function openModeModal(name) {
        currentSheetName = name;
        document.getElementById('modal-sheet-title').innerText = name;
        document.getElementById('mode-select-modal').style.display = 'flex';
        document.getElementById('selector-screen').style.display = 'none'; // リストを隠す
    }

    // ★ 修正箇所：モーダルを閉じるときにリストを復活させる
    function closeAllModals() {
        document.querySelectorAll('.modal-overlay').forEach(el => el.style.display = 'none');
        
        // 練習画面でも印刷画面でもないときだけ、リスト画面を表示する
        const pracHidden = document.getElementById('practice-app').style.display === 'none';
        const viewHidden = document.getElementById('view-app').style.display === 'none';
        if (pracHidden && viewHidden) {
            document.getElementById('selector-screen').style.display = 'flex';
            document.getElementById('top-update-btn').style.display = 'flex';
        }
    }

    function handleModeSelection(mode) {
        document.getElementById('mode-select-modal').style.display = 'none';
        if (mode === 'random') {
            launchPracticeMode('random');
        } else if (mode === 'practice') {
            const prog = allProgress[currentSheetName];
            if (prog && (prog.lastIndex > 0 || prog.retry.size > 0 || prog.perfect.size > 0)) {
                document.getElementById('opt-resume-btn').style.display = (prog.lastIndex > 0) ? 'block' : 'none';
                document.getElementById('opt-special-btn').style.display = (prog.retry.size > 0) ? 'block' : 'none';
                document.getElementById('opt-perfect-btn').style.display = (prog.perfect.size > 0) ? 'block' : 'none';
                document.getElementById('practice-options-modal').style.display = 'flex';
            } else { launchPracticeMode('restart'); }
        } else { launchViewMode(mode); }
    }

    function confirmPracticeStart(type) {
        document.getElementById('practice-options-modal').style.display = 'none';
        launchPracticeMode(type);
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function launchPracticeMode(type) {
        document.getElementById('selector-screen').style.display = 'none';
        document.getElementById('practice-app').style.display = 'grid';
        document.getElementById('view-app').style.display = 'none';
        document.body.className = "mode-practice";
        if (!allProgress[currentSheetName]) allProgress[currentSheetName] = { perfect: new Set(), retry: new Set(), lastIndex: 0 };
        const master = allData[currentSheetName];
        
        document.getElementById('mode-badge').classList.add('hidden');
        document.getElementById('mode-badge-perfect').classList.add('hidden');
        document.getElementById('mode-badge-random').classList.add('hidden');

        if (type === 'special') {
            currentModeType = 'retry';
            const indices = Array.from(allProgress[currentSheetName].retry).sort((a,b)=>a-b);
            currentQuestions = indices.map(idx => ({...master[idx], originalIndex: idx}));
            currentIndex = 0;
            document.getElementById('mode-badge').classList.remove('hidden');
        } else if (type === 'perfect_check') {
            currentModeType = 'perfect';
            const indices = Array.from(allProgress[currentSheetName].perfect).sort((a,b)=>a-b);
            currentQuestions = indices.map(idx => ({...master[idx], originalIndex: idx}));
            currentIndex = 0;
            document.getElementById('mode-badge-perfect').classList.remove('hidden');
        } else if (type === 'random') {
            currentModeType = 'random';
            let temp = master.map((q, i) => ({...q, originalIndex: i}));
            currentQuestions = shuffleArray(temp);
            currentIndex = 0;
            document.getElementById('mode-badge-random').classList.remove('hidden');
        } else {
            currentModeType = 'normal';
            currentQuestions = master.map((q, i) => ({...q, originalIndex: i}));
            currentIndex = (type === 'resume') ? allProgress[currentSheetName].lastIndex : 0;
        }
        document.getElementById('sheet-title').innerText = "【 " + currentSheetName + " 】";
        showQuestion();
    }

    function showQuestion() {
        if (currentIndex >= currentQuestions.length) {
            alert("お疲れ様でした！リストに戻ります。");
            if (currentModeType === 'normal') allProgress[currentSheetName].lastIndex = 0;
            return backToList();
        }
        const q = currentQuestions[currentIndex];
        document.getElementById('q-number').innerText = (currentModeType !== 'normal') ? (currentIndex + 1) : (q.originalIndex + 1);
        document.getElementById('q-text').innerHTML = q.q.replace(/[（\(](.*?)[）\)]/g, '<span class="highlight">$1</span>');
        const ansArea = document.getElementById('a-text');
        ansArea.innerHTML = q.a.split(/[、,]/).map(t => `<div class="ans-column">${t.trim()}</div>`).join('');
        ansArea.classList.remove('visible');
        document.getElementById('show-btn').classList.remove('hidden');
        document.getElementById('judgement-btns').classList.add('hidden');
        document.getElementById('retry-options').classList.add('hidden');
        
        if (currentModeType === 'normal') allProgress[currentSheetName].lastIndex = currentIndex;
        updateStats();
    }

    function showAnswer() {
        document.getElementById('a-text').classList.add('visible');
        document.getElementById('show-btn').classList.add('hidden');
        document.getElementById('judgement-btns').classList.remove('hidden');
    }

    function record(type) {
        const p = allProgress[currentSheetName];
        const idx = currentQuestions[currentIndex].originalIndex;
        if (type === 'perfect') {
            p.perfect.add(idx); p.retry.delete(idx); nextStep();
        } else {
            p.retry.add(idx); p.perfect.delete(idx);
            document.getElementById('judgement-btns').classList.add('hidden');
            document.getElementById('retry-options').classList.remove('hidden');
        }
        saveProgress(); updateStats();
    }

    function nextStep() { currentIndex++; showQuestion(); }
    function tryAgain() { 
        document.getElementById('a-text').classList.remove('visible'); 
        document.getElementById('retry-options').classList.add('hidden'); 
        document.getElementById('show-btn').classList.remove('hidden'); 
    }

    function updateStats() {
        const p = allProgress[currentSheetName];
        document.getElementById('stat-total').innerText = `${currentIndex+1}/${currentQuestions.length}`;
        document.getElementById('stat-perfect').innerText = p.perfect.size;
        document.getElementById('stat-retry').innerText = p.retry.size;
        
        const sBtn = document.getElementById('side-special-btn'), pBtn = document.getElementById('side-perfect-btn');
        (currentModeType !== 'retry' && p.retry.size > 0) ? sBtn.classList.remove('hidden') : sBtn.classList.add('hidden');
        (currentModeType !== 'perfect' && p.perfect.size > 0) ? pBtn.classList.remove('hidden') : pBtn.classList.add('hidden');
    }

    function launchViewMode(mode) {
        document.body.className = "mode-view";
        document.getElementById('selector-screen').style.display = 'none';
        document.getElementById('view-app').style.display = 'block';
        viewPage = 0;
        if (mode === 'view') {
            isAllAnswersVisible = false;
            document.getElementById('nav-controls').style.display = 'flex';
            updateViewHeaderButtons(); renderViewPage();
        } else {
            renderAllPagesForPrint();
            setTimeout(() => { window.print(); }, 500);
        }
    }

    function updateViewHeaderButtons() {
        const p = allProgress[currentSheetName], rCount = p ? p.retry.size : 0, pCount = p ? p.perfect.size : 0;
        const rBtn = document.getElementById('view-retry-btn'), fBtn = document.getElementById('view-perfect-btn');
        rCount > 0 ? (rBtn.classList.remove('hidden'), rBtn.innerText = `🔥 とっくん(${rCount})`) : rBtn.classList.add('hidden');
        pCount > 0 ? (fBtn.classList.remove('hidden'), fBtn.innerText = `✨ ふくしゅう(${pCount})`) : fBtn.classList.add('hidden');
    }

    function toggleSquare(el, sheet, idx) {
        let current = parseInt(el.getAttribute('data-state') || '0');
        let next = (current + 1) % 3;
        el.setAttribute('data-state', next);
        if (!allProgress[sheet]) allProgress[sheet] = { perfect: new Set(), retry: new Set(), lastIndex: 0 };
        const p = allProgress[sheet];
        if (next === 1) { p.perfect.add(idx); p.retry.delete(idx); }
        else if (next === 2) { p.retry.add(idx); p.perfect.delete(idx); }
        else { p.perfect.delete(idx); p.retry.delete(idx); }
        saveProgress(); updateViewHeaderButtons();
    }

    function createPageCanvas(pageData, title, startIndex) {
        const canvas = document.createElement('div'); canvas.className = 'view-canvas';
        const titleDiv = document.createElement('div'); titleDiv.className = 'print-title'; titleDiv.innerText = title; canvas.appendChild(titleDiv);
        const grid = document.createElement('div'); grid.className = 'kanji-table-grid';
        const table = document.createElement('table'); table.className = 'unified-table';
        const rows = ['tr-check', 'tr-num', 'tr-ques', 'tr-num2', 'tr-ans'].map(cls => { const tr = document.createElement('tr'); tr.className = cls; return tr; });

        for (let i = 0; i < itemsPerPage; i++) {
            const qObj = pageData[i], isExist = !!qObj, realIdx = startIndex + i;
            let initialState = 0;
            if (isExist && allProgress[currentSheetName]) {
                const p = allProgress[currentSheetName];
                if (p.perfect.has(realIdx)) initialState = 1; else if (p.retry.has(realIdx)) initialState = 2;
            }
            rows[0].innerHTML += `<td><div class="square ${isExist ? '' : 'hidden'}" data-state="${initialState}" onclick="toggleSquare(this, '${currentSheetName}', ${realIdx})"></div></td>`;
            rows[1].innerHTML += `<td><span>${isExist ? realIdx + 1 : ""}</span></td>`;
            rows[2].innerHTML += `<td><div class="h-ques-inner"><div class="ques-wrapper">${isExist ? qObj.q.replace(/[（\(](.*?)[）\)]/g, '<span class="highlight">$1</span>') : ""}</div></div></td>`;
            rows[3].innerHTML += `<td><span>${isExist ? realIdx + 1 : ""}</span></td>`;
            rows[4].innerHTML += `<td onclick="toggleSingleAns(this)"><div class="ans-wrapper ${!isAllAnswersVisible && isExist ? 'show-hint' : ''}"><span class="ans-text ${!isAllAnswersVisible && isExist ? 'blind' : ''}">${isExist ? qObj.a.replace(/、/g, '<br>') : ""}</span></div></td>`;
        }
        rows.forEach(r => table.appendChild(r)); grid.appendChild(table); canvas.appendChild(grid); return canvas;
    }

    function renderViewPage() {
        const container = document.getElementById('view-mode-container'); container.innerHTML = "";
        const startIdx = viewPage * itemsPerPage;
        container.appendChild(createPageCanvas(allData[currentSheetName].slice(startIdx, startIdx + itemsPerPage), currentSheetName, startIdx));
        document.getElementById('page-info').innerText = `${viewPage + 1} / ${Math.ceil(allData[currentSheetName].length / itemsPerPage)}`;
    }

    function renderAllPagesForPrint() {
        const container = document.getElementById('view-mode-container'); container.innerHTML = "";
        for (let i = 0; i < Math.ceil(allData[currentSheetName].length / itemsPerPage); i++) {
            container.appendChild(createPageCanvas(allData[currentSheetName].slice(i * itemsPerPage, (i+1) * itemsPerPage), currentSheetName, i * itemsPerPage));
        }
    }

    function changeViewPage(step) {
        const max = Math.ceil(allData[currentSheetName].length / itemsPerPage);
        if (viewPage + step >= 0 && viewPage + step < max) { viewPage += step; renderViewPage(); }
    }

    function toggleAllAnswers() {
        isAllAnswersVisible = !isAllAnswersVisible;
        document.getElementById('toggle-all-btn').innerText = isAllAnswersVisible ? "すべての答えをかくす" : "すべての答えをひょうじ";
        renderViewPage();
    }

    function toggleSingleAns(td) {
        const text = td.querySelector('.ans-text'), wrap = td.querySelector('.ans-wrapper');
        if (text) { text.classList.toggle('blind'); wrap.classList.toggle('show-hint'); }
    }

    function backToList() { saveProgress(); createMenu(); }
    function clearProg(name) { if(confirm(`「${name}」の記録を消しますか？`)) { delete allProgress[name]; saveProgress(); createMenu(); } }
    function suspendQuiz() { if(confirm("保存して戻りますか？")) { saveProgress(); createMenu(); } }
    function startSidebarSpecial() { launchPracticeMode('special'); }
    function startSidebarPerfect() { launchPracticeMode('perfect_check'); }
    function startViewSpecial() { launchPracticeMode('special'); }
    function startViewPerfect() { launchPracticeMode('perfect_check'); }

    function switchToViewMode() {
        saveProgress(); 
        document.getElementById('practice-app').style.display = 'none'; 
        launchViewMode('view'); 
    }

    function returnToPractice() {
        const p = allProgress[currentSheetName];
        if (p && p.lastIndex > 0) {
            launchPracticeMode('resume');
        } else {
            launchPracticeMode('restart');
        }
    }
    
    fetchData();
</script>
</body>
</html>
